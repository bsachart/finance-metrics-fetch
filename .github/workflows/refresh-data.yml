name: Refresh Market Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"
    # Daily alternative:
    # - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changes.outputs.changed }}
      deployed_ref: ${{ steps.deployed_ref.outputs.ref }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync Python dependencies
        run: uv sync

      - name: Refresh market and constituent datasets
        run: uv run python -m finance_metrics_fetch.cli refresh --config config/tickers.json

      - name: Check for repository changes
        id: changes
        run: |
          if git diff --quiet -- data config; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit refreshed data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data config
          git commit -m "chore: refresh market data"

      - name: Capture deployed ref
        id: deployed_ref
        if: steps.changes.outputs.changed == 'true'
        run: echo "ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Push refreshed data
        if: steps.changes.outputs.changed == 'true'
        run: git push

  deploy:
    if: needs.refresh.outputs.changed == 'true'
    needs: refresh
    uses: ./.github/workflows/deploy-ui-reusable.yml
    permissions:
      contents: read
      pages: write
      id-token: write
    with:
      ref: ${{ needs.refresh.outputs.deployed_ref }}
